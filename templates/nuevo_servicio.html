{% extends "base.html" %}

{% block titulo %}Nuevo servicio — Reserfy{% endblock %}

{% block contenido %}
<div class="card" style="max-width: 420px; margin: 0 auto;">
    <h2>✂️ Nuevo servicio</h2>
    <form method="POST">
        <div class="form-grupo">
            <label>Nombre del servicio</label>
            <input type="text" name="nombre" required placeholder="Ej: Corte de cabello">
        </div>
        <div class="form-grupo">
            <label>Duración (minutos)</label>
            <input type="number" name="duracion_min" required value="60" min="15" step="15">
        </div>
        <div class="form-grupo">
            <label>Precio (opcional)</label>
            <input type="number" name="precio" step="0.01" min="0" placeholder="Ej: 500.00">
        </div>
        <button type="submit" class="btn btn-primary">Guardar servicio</button>
        <a href="{{ url_for('ver_servicios') }}" class="btn" style="margin-left: 1rem; color: #666;">Cancelar</a>
    </form>
</div>
{% endblock %}
