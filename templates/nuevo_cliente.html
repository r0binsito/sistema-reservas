{% extends "base.html" %}

{% block titulo %}Nuevo cliente — Reserfy{% endblock %}

{% block contenido %}
<div class="card" style="max-width: 420px; margin: 0 auto;">
    <h2>➕ Nuevo cliente</h2>
    <form method="POST">
        <div class="form-grupo">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="form-grupo">
            <label>Teléfono</label>
            <input type="text" name="telefono">
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('ver_clientes') }}" class="btn" style="margin-left: 1rem; color: #666;">Cancelar</a>
    </form>
</div>
{% endblock %}
