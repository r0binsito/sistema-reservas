services:
  - type: web
    name: reserfy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reserfy-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: reserfy-db
    plan: free